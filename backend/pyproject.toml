[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

# FastAPI の Depends/File/Form/Query は引数デフォルトで呼ぶのが正しい使い方なので
# B008（関数呼び出しをデフォルト値にしない）の対象から除外する。
[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.File", "fastapi.Form", "fastapi.Query"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
